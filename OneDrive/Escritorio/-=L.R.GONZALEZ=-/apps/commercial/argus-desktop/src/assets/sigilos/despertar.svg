<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Sol que nace - DESPERTAR -->
  <!-- Horizonte -->
  <line x1="8" y1="50" x2="72" y2="50" stroke="#D4A054" stroke-width="1.5" opacity="0.6"/>
  <!-- Semicirculo solar emergiendo -->
  <path d="M20 50 A20 20 0 0 1 60 50" stroke="#D4A054" stroke-width="2" fill="none"/>
  <!-- Centro del sol -->
  <circle cx="40" cy="50" r="4" fill="#D4A054" opacity="0.9"/>
  <!-- Rayos ascendentes -->
  <line x1="40" y1="44" x2="40" y2="36" stroke="#D4A054" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="47" y1="46" x2="52" y2="40" stroke="#D4A054" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="33" y1="46" x2="28" y2="40" stroke="#D4A054" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="53" y1="50" x2="60" y2="50" stroke="#D4A054" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="27" y1="50" x2="20" y2="50" stroke="#D4A054" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <!-- Texto DESPERTAR bajo el sol -->
  <text x="40" y="70" text-anchor="middle" font-size="7" fill="#D4A054" opacity="0.7" font-family="serif" letter-spacing="2">DESPERTAR</text>
</svg>
