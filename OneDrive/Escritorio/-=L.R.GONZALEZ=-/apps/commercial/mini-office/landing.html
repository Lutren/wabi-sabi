<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=index.html">
  <title>Mini Office — redirigiendo...</title>
  <style>
    body {
      background: #0A0A0F;
      color: #D4C9A8;
      font-family: 'IBM Plex Sans', 'Helvetica Neue', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .loading {
      text-align: center;
      padding: 40px;
    }
    .loading h1 {
      font-family: 'Archivo Black', 'Impact', sans-serif;
      color: #B87333;
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    .loading p {
      color: #8A8674;
      font-size: 1.1rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      margin: 20px auto;
      border: 4px solid #2A2A32;
      border-top-color: #B87333;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .link {
      color: #2ECCC7;
      text-decoration: none;
    }
    .link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="loading">
    <h1>◈ MINI OFFICE</h1>
    <p>Cargando sistema...</p>
    <div class="spinner"></div>
    <p>
      <small>
        Si no eres redirigido automaticamente, haz click
        <a href="index.html" class="link">aquí</a>
      </small>
    </p>
  </div>
</body>
</html>
