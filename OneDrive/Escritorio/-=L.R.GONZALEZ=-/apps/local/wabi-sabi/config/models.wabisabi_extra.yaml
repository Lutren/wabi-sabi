profile: wabi-sabi-extra
models:
  - id: deep_see4
    provider: deepsee
    display_name: Deep See 4
    priority: 1
    adapter: deepsee/api
    credentials:
      api_key_env: DEEPSEE_API_KEY
  - id: qwen_3_6_plus
    provider: qwen
    display_name: Qwen 3.6 Plus
    priority: 2
    adapter: qwen/api
    credentials:
      api_key_env: QWEN_API_KEY
  - id: nemotron_ultra_253b
    provider: nvidia
    display_name: Llama 3.1 Nemotron Ultra 253B
    priority: 1
    adapter: nvcr/ngc
    credentials:
      nvcr_token_env: NVCR_TOKEN
      ngc_accesskey_id_env: NGC_ACCESSKEY_ID
      ngc_accesskey_secret_env: NGC_ACCESSKEY_SECRET

