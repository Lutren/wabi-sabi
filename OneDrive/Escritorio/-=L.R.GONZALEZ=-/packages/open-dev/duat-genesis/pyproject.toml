[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "duat-genesis"
version = "0.1.0"
description = "Synthetic DUAT Genesis sandbox for observable simulation experiments."
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
authors = [
  { name = "L.R. Gonzalez" }
]
keywords = ["simulation", "observability", "falsification", "duat", "synthetic"]
dependencies = []

[project.scripts]
duat-genesis = "duat_genesis.cli:main"

[tool.duat-genesis]
status = "public_synthetic_sandbox"
calibration = "DEMO_ONLY"
private_boundary = "no_geodia_private_engineering_no_rpg_assets_no_medical_claims"
