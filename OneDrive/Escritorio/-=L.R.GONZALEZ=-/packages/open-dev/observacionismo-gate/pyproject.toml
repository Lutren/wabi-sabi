[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "observacionismo-gate"
version = "1.0.0"
description = "SDK MIT para decisiones observacionistas por evidencia, jamming, costo y aprobacion."
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
authors = [
  { name = "L.R. Gonzalez" }
]
keywords = ["ai", "agents", "governance", "witness", "policy", "medioevo", "claudio"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Topic :: Software Development :: Libraries :: Python Modules"
]
dependencies = []

[project.urls]
Homepage = "https://medioevo.space"

[tool.setuptools]
py-modules = ["observacionismo_gate"]
